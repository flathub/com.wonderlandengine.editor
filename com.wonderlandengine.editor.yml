app-id: com.wonderlandengine.editor
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: WonderlandEditor
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Enabling VR Headset connection over adb and GPU acceleration
  - --device=all
  # Needs to talk to the network for authentication
  - --share=network
  # We need access to external drives and the homefolder, or where ever the user might store assets.
  - --filesystem=host
  # For desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # Necessary for crash reporting with sentry-native, which requires the ptrace system call
  - --allow=devel

  - --env=LD_LIBRARY_PATH=/app/lib:/app/lib64
  - --env=OPENSSL_CONF=/app/etc/ssl/openssl.cnf
modules:
  - name: glfw
    buildsystem: cmake-ninja
    build-options:
      no-debuginfo: true
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DGLFW_BUILD_DOCS=OFF
    sources:
      - type: git
        url: https://github.com/glfw/glfw.git
        tag: 3.3.8
        commit: 7482de6071d21db77a7236155da44c172a7f6c9e

  - name: editor
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      # ubuntu-arm64 tarballs ship engine libs under lib64/ (Corrade's
      # lib-suffix detection); ubuntu x86_64 ships them under lib/.
      # Move whichever exists into the matching /app/ prefix — both are
      # already covered by LD_LIBRARY_PATH below.
      - mkdir -p ${FLATPAK_DEST}/bin ${FLATPAK_DEST}/share ${FLATPAK_DEST}/lib ${FLATPAK_DEST}/lib64
      - mv bin/* ${FLATPAK_DEST}/bin
      - if [ -d lib ]; then mv lib/* ${FLATPAK_DEST}/lib; fi
      - if [ -d lib64 ]; then mv lib64/* ${FLATPAK_DEST}/lib64; fi
      - mv share/* ${FLATPAK_DEST}/share
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://downloads.wonderlandengine.com/1.6.1/WonderlandEngine-1.6.1-Flatpak-x86_64.tar.gz
        sha512: e226e3cd79696e798af5f439a487dae5a2841ecd30f06f566ccdbd684c1146c9c579f2fec7d3ede104a3ee0686bea6e9e2a15606f01a0305818637468fff682d
        strip-components: 0
      - type: archive
        only-arches: [aarch64]
        url: https://downloads.wonderlandengine.com/1.6.1/WonderlandEngine-1.6.1-Flatpak-aarch64.tar.gz
        sha512: 3d9150ecbe4915a4eaee0d95f80859774d8afd88027863829f127f595ab5712e33a8c7a3475e01a1d4e11763f749640ce83bb611def659ba7ac45e8cd3e70db8
        strip-components: 0
