app-id: com.wonderlandengine.editor
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: WonderlandEditor
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Enabling VR Headset connection over adb and GPU acceleration
  - --device=all
  # Needs to talk to the network for authentication
  - --share=network
  # We need access to external drives and the homefolder, or where ever the user might store assets.
  - --filesystem=host
  # For desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # Necessary for crash reporting with sentry-native, which requires the ptrace system call
  - --allow=devel

  - --env=LD_LIBRARY_PATH=/app/lib:/app/lib64
  - --env=OPENSSL_CONF=/app/etc/ssl/openssl.cnf
modules:
  - name: glfw
    buildsystem: cmake-ninja
    build-options:
      no-debuginfo: true
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DGLFW_BUILD_DOCS=OFF
    sources:
      - type: git
        url: https://github.com/glfw/glfw.git
        tag: 3.3.8
        commit: 7482de6071d21db77a7236155da44c172a7f6c9e

  - name: editor
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - mkdir -p ${FLATPAK_DEST}/bin ${FLATPAK_DEST}/share ${FLATPAK_DEST}/lib
      - mv bin/* ${FLATPAK_DEST}/bin
      - mv lib/* ${FLATPAK_DEST}/lib
      - mv share/* ${FLATPAK_DEST}/share
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://downloads.wonderlandengine.com/1.6.1/WonderlandEngine-1.6.1-Flatpak-x86_64.tar.gz
        sha512: fa78a5dd36bbdf187bb92f06deac20df1761459709f27f6e4aba3b85d3e546cbd8bcd2defee9629706f73f89e21fc9855d24b740bbf3448772cb79efe3e7fd22
        strip-components: 0
      - type: archive
        only-arches: [aarch64]
        url: https://downloads.wonderlandengine.com/1.6.1/WonderlandEngine-1.6.1-Flatpak-aarch64.tar.gz
        sha512: 967db4bac53d3806f2eedee08122599630e22c51672c7a8afcdf61e2337153f534d685bddefdfe0acc068ec4713047d7cb66c4ef268ce935ca0e423034fe5506
        strip-components: 0
